             description: 'number of clicks for the campaign'
             tests:
              - not_null
      - name: criteo
        identifier: raw_gz_criteo
        description: 'ad campaigns on criteo'
        columns:
           - name: date_date
             description: 'date of each campaign'
           - name: paid_source
             description: 'tool used for the campaign'
