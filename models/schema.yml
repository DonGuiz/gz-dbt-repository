version: 2

sources: 
  - name: gz_raw_data
    tables:
      - name: raw_gz_product
        description: 'list of products'
        columns:
           - name: products_id
             description: 'Unique ID of each product'
             tests:
              - unique
              - not_null
           - name: purchase_price
             description: 'Purchase price for each product'
      - name: raw_gz_sales
        description: 'list of sales'
        columns:
           - name: date_date
             description: 'date of purchase'
           - name: orders_id
             description: 'unique ID of each order'
           - name: products_id
             description: 'unique ID of each product'
      - name: raw_gz_ship
        description: list of orders
        columns:
           - name: orders_id
             description: 'unique ID of each order'
             tests:
              - unique
              - not_null
           - name: sheeping_fee
             description: 'Ship cost for each order'
      - name: adwords
        identifier: raw_gz_adwords
        description: 'ad campaigns on google adwords'
        columns:
           - name: date_date
             description: 'date of each campaign'
           - name: paid_source
             description: 'tool used for the campaign'
           - name: campaign_key
             description: 'unique id of each campaign'
             tests:
              - not_null
           - name: campaign_name
             description: 'name of the campaign'
           - name: ads_cost
             description: 'cost of the campaign'
             tests:
              - not_null
           - name: impression
             description: 'number of impressions for the campaign'
             tests:
              - not_null
           - name: click
             description: 'number of clicks for the campaign'
             tests:
              - not_null
      - name: bing
        identifier: raw_gz_bing
        description: 'ad campaigns on bing'
        columns:
